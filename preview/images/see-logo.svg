<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 110" role="img" aria-label="Simplify Energy Economics">
  <title>Simplify Energy Economics</title>
  <!-- Eye / data glyph -->
  <g fill="none" stroke="#255951" stroke-linecap="round" stroke-linejoin="round" stroke-width="6">
    <!-- top right data lines -->
    <path d="M70 16 H100"/>
    <path d="M76 28 H100"/>
    <path d="M82 40 H100"/>
    <!-- bottom left data lines -->
    <path d="M10 70 H40"/>
    <path d="M10 82 H34"/>
