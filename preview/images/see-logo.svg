    <path d="M48 60 L54 53 L60 58 L66 50" stroke-width="5"/>
  </g>

  <!-- Wordmark -->
  <g font-family="'Roboto Condensed', 'Helvetica Neue', Arial, sans-serif" font-weight="700" fill="#255951">
    <text x="120" y="52" font-size="28" letter-spacing="0.5">Simplify Energy</text>
    <text x="120" y="86" font-size="28" letter-spacing="0.5">Economics</text>
